<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
		name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<meta content="email=no" name="format-detection">
		<title>
			article
		</title>
		<style type="text/css">
			html { font-size: 35px; }
		</style>
		<link rel="stylesheet" type="text/css" href="./static/css/common.css">
		<script type="text/javascript" src="./static/js/bignumber.min.js">
		</script>
		<link rel="stylesheet" type="text/css" href="./static/css/box_pay.css">
		<style>
				body{
					background: #e4e4e4;
				}
				.t_header {
				    height: 1.2rem;
				    background-color: #ffffff!important;
				    display: flex;
				    flex-direction: row;
				    position: relative;
				}
				.t_header span:last-child i {
				    font-size: .48rem;
				    position: absolute;
				    left: 46%;
				    top: 50%;
				    transform: translate(-50%, -50%);
				    color: black;
				}
				.f_box_bank .f_content ul li {
				    height: 1.333333rem;
				    line-height: 1.333333rem;
				    padding-left: 1.066666rem;
				    text-align: left;
				    background: #e4e4e4;
				    border-bottom: .026667rem solid #d4d4d4;
				    position: relative;
				    color: gray;
				}
				label {
				    cursor: default;
				    color:gray;
				}
				.t_box_pay .t_con_pay {
				    flex: 1;
				    background-color: #e4e4e4;
				    overflow-y: scroll;
				    -webkit-overflow-scrolling: touch;
				}
			
				

		</style>
	</head>
	<body>
		
		<div id="app">
			<div class="box">
				<div class="jun-content">
					<div class="t_box_pay">
						<div class="t_header">
							<span>
								<img src="./static/img/icon_back.png" alt="" onClick="javascript:history.back()">
							</span>
							<span>
								<i id="title">
							
								</i>
							</span>
						</div>
						<div class="t_con_pay" >
							<div id="content" style="border-top: .026667rem solid #000;padding: .333333rem;">
								
							</div>
						</div>
					</div>
				</div>
				<div class="footer" id="footer">
				    
				</div>
				<script type="text/javascript" src="./static/js/jquery-1.9.1.min.js">
				</script>
				<script src="./static/js/ajaxUtil.js"></script>
				<script src="./static/js/footer.js"></script>
				<script type="text/javascript">
					var title =  new URLSearchParams(window.location.search).get('title')
					AjaxUtil.get('/index/index/getArticleByTitleName?title='+title).then(res => {
						if(res.code==1&&res.data.info){
							$("#title").text(res.data.info.title)
					
							$("#content").html(res.data.info.content.replaceAll('/upload/',baseConfig.baseUrl+/upload/))
						}
						
					})
					
					$(function() {
						var nav = "[menu]";
						if (nav == "index") {
							$(".one").addClass("router-link-exact-active");
						}
						if (nav == "recharge") {
							$(".two").addClass("router-link-exact-active");
						}
						if (nav == "hold") {
							$(".three").addClass("router-link-exact-active");
						}
						if (nav == "yeb") {
							$(".four").addClass("router-link-exact-active");
						}
						if (nav == "user") {
							$(".five").addClass("router-link-exact-active");
						}
					})
				</script>
			</div>
		</div>
	</body>

</html>
