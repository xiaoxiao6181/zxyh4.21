            <link rel="stylesheet" type="text/css" href="./static/css/tipmask.css">
            <div class="tipMask" style="display:none">
                <div class="cont">
                    <p class="title" data-i18n="common.prompt">提示</p>

            <script type="text/javascript">
                // 初始化语言
                const savedLang = localStorage.getItem('preferredLanguage') || I18n.defaultLang;
                
                I18n.init(savedLang).then(() => {
                    console.log('钱包页面语言初始化完成:', I18n.currentLang);
                    updateUIText();
                    
                    // 监听语言变化
                    $(document).on('languageChanged', function(event, lang) {
                        console.log('语言已切换到:', lang);
                        updateUIText();
                    });
                });
                
                // 更新UI文本
                function updateUIText() {
                    if (typeof I18n === 'undefined') return;
                    
                    // 更新页面标题
                    document.title = I18n.t('wallet.walletTitle');
                    
                    // 更新所有带有data-i18n属性的元素
                    $('[data-i18n]').each(function() {
                        const $elem = $(this);
                        const key = $elem.data('i18n');
                        const text = I18n.t(key);
                        if (text) {
                            $elem.text(text);
                        }
                    });
                }
                
                // 加载用户信息
      
                
                // 消息提示函数（支持多语言）
                function msg(title, content, type, url) {
                    // 使用多语言翻译标题
                    const titleText = typeof I18n !== 'undefined' ? I18n.t(title) || title : title;
                    
                    $(".contents").html(content);
                    if (type == 1) {
                        const okText = typeof I18n !== 'undefined' ? I18n.t('common.ok') : 'OK';
                        var btn = '<div class="confirm guanbi" style="background-color:#33B497;" onclick="$(\'.tipMask\').hide();">' + okText + '</div>';
                    } else {
                        const okText = typeof I18n !== 'undefined' ? I18n.t('common.ok') : 'OK';
                        var btn = '<div class="confirm guanbi" style="background-color:#33B497;" onclick="window.location.href=\'' + url + '\'">' + okText + '</div>';
                    }
                    $("#msgBtn").html(btn);
                    $(".tipMask").show();
                }
                (async function() {
					console.log('开始执行...');
					let userInfo=await getUserInfo();
					$(".totalMoney").text(userInfo.money)
					
					
				})();
                $( function() {
                    // 加载用户信息
         
                    
                    // 导航激活状态
                    var nav = "wallet";
                    if (nav == "index") {
                        $(".one").addClass("router-link-exact-active");
                    }
                    if (nav == "wallet") {
                        $(".two").addClass("router-link-exact-active");
                    }
                    if (nav == "hold") {
                        $(".three").addClass("router-link-exact-active");
                    }
                    if (nav == "yeb") {
                        $(".four").addClass("router-link-exact-active");
                    }
                    if (nav == "user") {
                        $(".five").addClass("router-link-exact-active");
                    }
                    
                    // 绑定事件
                    $(".confirm.guanbi").on('click', function() {
                        $('.tipMask').hide();
                    });
                });
            </script>
