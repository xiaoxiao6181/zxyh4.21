                    <script type="text/javascript">
                        $(function() {
                            // 初始化语言
							let langlist=''
							I18n.langlist.forEach(item=>{
								console.log(item)
								langlist+= `<span id="langcns" onclick="changelang('${item.value}')" >${item.name}</span><br>  `
							})
							$('#langlist').html(langlist)
                            const savedLang = localStorage.getItem('preferredLanguage') || I18n.defaultLang;
                            I18n.init(savedLang);
                            
                            var nav = "user";
                            if (nav == "index") {
                                $(".one").addClass("router-link-exact-active");
                            }
                            if (nav == "wallet") {
                                $(".two").addClass("router-link-exact-active");
                            }
                            if (nav == "hold") {
                                $(".three").addClass("router-link-exact-active");
                            }
                            if (nav == "yeb") {
                                $(".four").addClass("router-link-exact-active");
                            }
                            if (nav == "user") {
                                $(".five").addClass("router-link-exact-active");
                            }
                        })
                    </script>
                    <script>
                        function showlang(id) {
                            if (id == 1) {
                                document.getElementById('langdiv').style.display = "block";
                                // 更新语言选择器文本
                                updateLangSelectorText();
                            } else {
                                document.getElementById('langdiv').style.display = "none";
                            }
                        }
                        
                        function updateLangSelectorText() {
                            // 更新语言选择器中的文本
                            if (window.I18n && window.I18n.t) {
                                $('#langcns').text(I18n.t('common.zh'));
                                $('#langen').text(I18n.t('common.en'));
                            }
                        }
                    </script>
                    <script>
                        (async function() {
                            console.log('开始执行...');
                            let userInfo = await getUserInfo();
                            $(".username").text(userInfo.phone);
							   $(".money").text(userInfo.money);
                            $(".userlevel").text(userInfo.level_name);
                            
                            AjaxUtil.get('/index/index/getConfigInfo').then(res => {
                                localStorage.setItem('config', JSON.stringify(res.data));
                                $(".f_mine_header").attr('src', baseConfig.baseUrl + res.data.login_img);
                                $("#service").click(function(){
                                    location.href = res.data.service;
                                });
                            });
                            
                            // 监听语言变化事件
                            $(document).on('languageChanged', function(event, lang) {
                                console.log('语言已切换到:', lang);
                                // 重新加载用户信息中的文本
                                if (userInfo.level_name) {
                                    $(".userlevel").text(userInfo.level_name);
                                }
                            });
                            
                        })();
                        
                        function logout() {
                            AjaxUtil.get('/index/user/logOut').then(res => {
                                let code=localStorage.getItem('code')
                                localStorage.clear();
    							if(code){
    								localStorage.setItem('code',code)
    							}
                                location.href = './login.html';
                            });
                        }
                        function changelang(t) {
                            if (t == "list") {
                                $('#langlist').fadeToggle();
                                return;
                            } else {
								console.log(t)
                        		I18n.changeLanguage(t)
                                $('#langlist').fadeToggle();
								location.reload();
                            }
                        
                        }
