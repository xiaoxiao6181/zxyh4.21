<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <meta content="black" name="apple-mobile-web-app-status-bar-style">
        <meta content="telephone=no" name="format-detection">
        <meta content="email=no" name="format-detection">
        <title data-i18n="rechargeRecord.pageTitle">充值记录</title>
        <style type="text/css">
            html {
                font-size: 35px;
            }
        </style>
        <link rel="stylesheet" type="text/css" href="./static/css/common.css">
        <script type="text/javascript" src="./static/js/bignumber.min.js"></script>
        <!-- 添加i18n.js -->
        <script src="./static/js/i18n.js"></script>
    </head>
    <body>
        <link rel="stylesheet" type="text/css" href="./static/css/box_pay.css">
        <style>
            body {
                background: #f3f3f3!important;
            }

            .t_header {
                height: 1.2rem !important;
                width: 100%;
                background-color: #ffffff;
                display: flex;
                flex-direction: row;
                z-index: 1000;
            }

            .f_box_accountrecord .t_box_accountrecord ul {
                display: flex;
                flex-direction: column;
                padding: .533333rem .8rem;
                font-size: .4rem;
                border-top: .026666rem solid #b9b9b9;
                color: gray;
                background-color: #eaeaea;
                border-bottom: .026666rem solid #b9b9b9;
            }
            .hide{
                display: none;
            }
            .color_0{
                color:blue;
            }
            .color_1{
                color:green;
            }
            .color_2{
                color:red;
            }
            .loading {
                text-align: center;
                padding: 20px;
                color: #666;
            }
            .no-data {
                text-align: center;
                padding: 40px 20px;
                color: #999;
            }
        </style>
        <div id="app">
            <div class="box">
                <!---->
                <div class="jun-content">
                    <div class="f_box_accountrecord">
                        <div class="t_header">
                            <span>
                                <img src="./static/img/icon_back.png" alt="" onClick="javascript:history.back()">
                            </span>
                            <span style="color:black">
                                <i data-i18n="rechargeRecord.title">充值记录</i>
                            </span>
                        </div>
                        <div class="t_box_accountrecord">
                            <!-- 这里会通过JS动态加载数据 -->
                            <div class="loading" data-i18n="rechargeRecord.loading">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="footer" id="footer">
                    
                </div>
                <script type="text/javascript" src="./static/js/jquery-1.9.1.min.js"></script>
                <script src="./static/js/ajaxUtil.js"></script>
                <script src="./static/js/utils.js"></script>
				<script src="./static/js/footer.js"></script>
                <script type="text/javascript">
                    // 状态文本映射函数
                    function getStatusText(status) {
                        const statusMap = {
                            0: I18n.t('rechargeRecord.statusPending'),
                            1: I18n.t('rechargeRecord.statusSuccess'),
                            2: I18n.t('rechargeRecord.statusFailed')
                        };
                        return statusMap[status] || I18n.t('rechargeRecord.statusUnknown');
                    }
                    
                    // 类型文本映射函数
                    function getTypeText(type) {
                        if (!type) return I18n.t('rechargeRecord.typeUnknown');
                        return type;
                    }
                    
                    // 获取失败原因文本
                    function getReasonText(reason) {
                        if (!reason || reason.trim() === '') {
                            return I18n.t('rechargeRecord.noReason');
                        }
                        return reason;
                    }
                    
                    // 加载充值记录数据
                    function loadRechargeRecords() {
                        // 显示加载中
                        $(".t_box_accountrecord").html(`<div class="loading">${I18n.t('rechargeRecord.loading')}</div>`);
                        
                        AjaxUtil.get("/index/user/recharge_record").then((res) => {
                            if (res.code == 1) {
                                const newList = res.data.recharge;
                                if (newList && newList.length > 0) {
                                    let htmlStr = "";
                                    $.each(newList, function (index, item) {
                                        htmlStr += `<ul>
                                            <li>
                                                <span data-i18n="rechargeRecord.time">${I18n.t('rechargeRecord.time')}：</span>
                                                <p>${item.time || ''}</p>
                                            </li>
                                            <li>
                                                <span data-i18n="rechargeRecord.amount">${I18n.t('rechargeRecord.amount')}：</span>
                                                <p>${item.money || '0.00'}</p>
                                            </li>
                                            <li>
                                                <span data-i18n="rechargeRecord.type">${I18n.t('rechargeRecord.type')}：</span>
                                                <p>${getTypeText(item.type)}</p>
                                            </li>
                                            <li>
                                                <span data-i18n="rechargeRecord.status">${I18n.t('rechargeRecord.status')}：</span>
                                                <p>
                                                    <span class="${'color_' + item.status}">
                                                        ${getStatusText(item.status)}
                                                    </span>
                                                </p>
                                            </li>
                                            <li class="${item.status == 2 ? '' : 'hide'}">
                                                <span data-i18n="rechargeRecord.reason">${I18n.t('rechargeRecord.reason')}：</span>
                                                <p>
                                                    <span>${getReasonText(item.reaolae)}</span>
                                                </p>
                                            </li>
                                        </ul>`;
                                    });
                                    $(".t_box_accountrecord").html(htmlStr);
                                    // 更新页面上的多语言文本
                                    updatePageLanguage();
                                } else {
                                    $(".t_box_accountrecord").html(`<div class="no-data">${I18n.t('rechargeRecord.noRecords')}</div>`);
                                }
                            } else {
                                console.log(res.info);
                                $(".t_box_accountrecord").html(`<div class="no-data">${I18n.t('rechargeRecord.loadFailed')}</div>`);
                            }
                        })
                    }
                    
                    // 更新页面上的多语言文本
                    function updatePageLanguage() {
                        document.querySelectorAll('[data-i18n]').forEach(el => {
                            const key = el.getAttribute('data-i18n');
                            if (key && window.I18n && window.I18n.t) {
                                const text = window.I18n.t(key);
                                if (text) {
                                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                                        if (el.placeholder !== '') {
                                            el.placeholder = text;
                                        }
                                    } else if (el.tagName === 'IMG') {
                                        el.alt = text;
                                    } else {
                                        el.textContent = text;
                                    }
                                }
                            }
                        });
                    }
                    
                    $(function() {
                        // 初始化语言
                        const savedLang = localStorage.getItem('preferredLanguage') || I18n.defaultLang;
                        I18n.init(savedLang).then(() => {
                            // 更新页面文本
                            updatePageLanguage();
                            // 加载数据
                            loadRechargeRecords();
                        });
                        
                        // 监听语言变化
                        $(document).on('languageChanged', function(event, lang) {
                            console.log('语言已切换到:', lang);
                            // 更新页面文本
                            updatePageLanguage();
                            // 重新加载数据（状态文本需要更新）
                            loadRechargeRecords();
                        });
                        
                        var nav = "user";
                        if (nav == "index") {
                            $(".one").addClass("router-link-exact-active");
                        }
                        if (nav == "wallet") {
                            $(".two").addClass("router-link-exact-active");
                        }
                        if (nav == "hold") {
                            $(".three").addClass("router-link-exact-active");
                        }
                        if (nav == "yeb") {
                            $(".four").addClass("router-link-exact-active");
                        }
                        if (nav == "user") {
                            $(".five").addClass("router-link-exact-active");
                        }
                    });
                </script>
            </div>
        </div>
    </body>
</html>
